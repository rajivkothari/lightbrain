<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LightBrain</title>
  <style>
    :root {
      --bg:      #080810;
      --surface: #10101c;
      --card:    #14142a;
      --border:  #252540;
      --accent:  #5858ff;
      --text:    #c0c0d8;
      --dim:     #50506a;
      --green:   #40e888;
      --amber:   #ffaa22;
      --red:     #ff3333;
      --beat-glow: #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      padding: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding-bottom: 14px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .logo {
      font-size: 1.05rem;
      font-weight: bold;
      letter-spacing: 0.25em;
      color: var(--accent);
    }
    .bpm {
      font-size: 1.35rem;
      font-weight: bold;
      color: var(--green);
      min-width: 90px;
      transition: color 0.08s;
    }
    .status {
      font-size: 0.72rem;
      color: var(--dim);
      margin-left: auto;
    }

    /* ---- Section ---- */
    .section { margin-bottom: 22px; }
    .section-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--dim);
      margin-bottom: 10px;
    }

    /* ---- Energy bars ---- */
    .bars { display: flex; flex-direction: column; gap: 7px; }
    .bar-row { display: flex; align-items: center; gap: 10px; }
    .bar-label { width: 58px; font-size: 0.7rem; color: var(--dim); text-align: right; }
    .bar-bg {
      flex: 1;
      height: 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 0.08s ease-out;
    }
    .bar-fill.low     { background: linear-gradient(90deg, #2266ff, #44aaff); }
    .bar-fill.mid     { background: linear-gradient(90deg, #22cc66, #44ffaa); }
    .bar-fill.high    { background: linear-gradient(90deg, #ccaa00, #ffee44); }
    .bar-fill.overall { background: linear-gradient(90deg, #cc4400, #ff8844); }

    /* ---- Button grid ---- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }
    .btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 0.78rem;
      padding: 11px 10px;
      cursor: pointer;
      border-radius: 5px;
      text-align: center;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      line-height: 1.3;
    }
    .btn:hover  { background: #1c1c34; border-color: var(--accent); }
    .btn:active { transform: scale(0.97); }

    .btn.active {
      background: #181838;
      border-color: var(--accent);
      color: #8888ff;
    }
    .btn .shortcut {
      display: block;
      font-size: 0.6rem;
      color: var(--dim);
      margin-bottom: 3px;
      letter-spacing: 0.08em;
    }
    .btn.active .shortcut { color: #6666cc; }

    /* ---- Blackout ---- */
    .btn-full { width: 100%; padding: 15px; font-size: 0.9rem; letter-spacing: 0.1em; }
    .btn-blackout { border-color: #333355; }
    .btn-blackout.active {
      background: #2a0000;
      border-color: var(--red);
      color: var(--red);
      animation: pulse-red 1s ease-in-out infinite;
    }
    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.75; }
    }

    /* ---- Release scene ---- */
    .btn-release {
      border-color: var(--amber);
      color: var(--amber);
    }
    .btn-release:hover { background: #1a1400; border-color: var(--amber); color: var(--amber); }

    /* ---- Connection indicator ---- */
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--dim);
      margin-right: 5px;
      vertical-align: middle;
    }
    .dot.ok  { background: var(--green); }
    .dot.err { background: var(--red); }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="logo">LIGHTBRAIN</span>
  <span class="bpm" id="bpm">-- BPM</span>
  <span class="status">
    <span class="dot" id="dot"></span>
    <span id="status-text">connecting…</span>
  </span>
</div>

<!-- Energy -->
<div class="section">
  <div class="section-label">Audio Energy</div>
  <div class="bars">
    <div class="bar-row">
      <span class="bar-label">Low</span>
      <div class="bar-bg"><div class="bar-fill low"     id="bar-low"></div></div>
    </div>
    <div class="bar-row">
      <span class="bar-label">Mid</span>
      <div class="bar-bg"><div class="bar-fill mid"     id="bar-mid"></div></div>
    </div>
    <div class="bar-row">
      <span class="bar-label">High</span>
      <div class="bar-bg"><div class="bar-fill high"    id="bar-high"></div></div>
    </div>
    <div class="bar-row">
      <span class="bar-label">Overall</span>
      <div class="bar-bg"><div class="bar-fill overall" id="bar-overall"></div></div>
    </div>
  </div>
</div>

<!-- Mode -->
<div class="section">
  <div class="section-label">Mode</div>
  <div class="grid" id="mode-grid"></div>
</div>

<!-- Scenes -->
<div class="section">
  <div class="section-label">Scene Presets</div>
  <div class="grid" id="scene-grid"></div>
  <div style="margin-top: 8px;">
    <button class="btn btn-full btn-release" onclick="cmd({type:'release_scene'})">
      <span class="shortcut">F10</span>Release Scene
    </button>
  </div>
</div>

<!-- Blackout -->
<div class="section">
  <button class="btn btn-full btn-blackout" id="blackout-btn"
          onclick="cmd({type:'blackout'})">
    BLACKOUT
  </button>
</div>

<script>
  // ---- Defaults shown before first server contact ----
  const DEFAULT_MODES = [
    {key:'open_dance',   display_name:'Open Dance'},
    {key:'dinner',       display_name:'Dinner'},
    {key:'banger',       display_name:'Banger'},
    {key:'indian_latin', display_name:'Indian / Latin'},
    {key:'slow_dance',   display_name:'Slow Dance'},
  ];

  let currentMode  = null;
  let currentScene = null;
  let modesReady   = false;
  let scenesReady  = false;

  // ---- Send command to engine ----
  function cmd(payload) {
    fetch('/api/command', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify(payload),
    }).catch(() => {});
  }

  // ---- Build grids (once) ----
  function buildModes(modes) {
    if (modesReady) return;
    const list = (modes && modes.length) ? modes : DEFAULT_MODES;
    const grid = document.getElementById('mode-grid');
    grid.innerHTML = '';
    list.forEach(m => {
      const b = document.createElement('button');
      b.className   = 'btn mode-btn';
      b.dataset.key = m.key;
      b.innerHTML   = `<span class="shortcut">${m.key}</span>${m.display_name}`;
      b.onclick     = () => cmd({type:'mode', value:m.key});
      grid.appendChild(b);
    });
    modesReady = true;
  }

  function buildScenes(scenes) {
    if (scenesReady || !scenes || !scenes.length) return;
    const grid = document.getElementById('scene-grid');
    grid.innerHTML = '';
    scenes.forEach((s, i) => {
      const b = document.createElement('button');
      b.className  = 'btn scene-btn';
      b.dataset.id = s.id;
      b.innerHTML  = `<span class="shortcut">F${i+1}</span>${s.name}`;
      b.onclick    = () => cmd({type:'scene', value:s.id});
      grid.appendChild(b);
    });
    scenesReady = true;
  }

  // ---- Apply incoming state ----
  function applyState(s) {
    // BPM + beat flash
    const bpmEl = document.getElementById('bpm');
    bpmEl.textContent = s.bpm > 1 ? `${Math.round(s.bpm)} BPM` : '-- BPM';
    if (s.beat) {
      bpmEl.style.color = '#ffffff';
      setTimeout(() => bpmEl.style.color = '', 80);
    }

    // Status bar
    document.getElementById('status-text').textContent =
      `${s.dmx_output || 'MOCK'}  ${s.fps || 0} fps`;

    // Energy bars
    const clamp = v => `${Math.min(100, Math.max(0, ((v||0)*100))).toFixed(1)}%`;
    document.getElementById('bar-low').style.width     = clamp(s.low_energy);
    document.getElementById('bar-mid').style.width     = clamp(s.mid_energy);
    document.getElementById('bar-high').style.width    = clamp(s.high_energy);
    document.getElementById('bar-overall').style.width = clamp(s.overall_energy);

    // Build grids first time
    buildModes(s.modes);
    buildScenes(s.scenes);

    // Mode active state
    if (s.mode !== currentMode) {
      currentMode = s.mode;
      document.querySelectorAll('.mode-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.key === currentMode)
      );
    }

    // Scene active state
    if (s.scene !== currentScene) {
      currentScene = s.scene;
      document.querySelectorAll('.scene-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.id === currentScene)
      );
    }

    // Blackout
    const bo = document.getElementById('blackout-btn');
    bo.classList.toggle('active', !!s.blackout);
    bo.textContent = s.blackout ? '■  BLACKOUT  ACTIVE' : 'BLACKOUT';
  }

  // ---- WebSocket with auto-reconnect ----
  function connect() {
    const dot    = document.getElementById('dot');
    const status = document.getElementById('status-text');
    const proto  = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws     = new WebSocket(`${proto}//${location.host}/ws`);

    ws.onopen = () => {
      dot.className    = 'dot ok';
      status.textContent = 'connected';
    };
    ws.onmessage = e => {
      try { applyState(JSON.parse(e.data)); } catch(_) {}
    };
    ws.onclose = () => {
      dot.className      = 'dot err';
      status.textContent = 'reconnecting…';
      setTimeout(connect, 2000);
    };
    ws.onerror = () => ws.close();
  }

  buildModes([]);  // show default mode buttons immediately
  connect();
</script>
</body>
</html>
